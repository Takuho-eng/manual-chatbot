<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マニュアルチャットボット</title>
  <style>
    /* ── リセット & ベース ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", "Yu Gothic", sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── チャットコンテナ ── */
    .chat-container {
      width: 100%;
      max-width: 780px;
      height: 100dvh;
      max-height: 900px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── ヘッダー ── */
    .chat-header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .header-text h1 { font-size: 17px; font-weight: 700; line-height: 1.3; }
    .header-text p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    .user-info {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-icon {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.3); }

    /* ── ステータスバー ── */
    .status-bar {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 7px 20px;
      font-size: 12px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    .status-dot.loading { background: #f59e0b; animation: pulse 1.2s infinite; }
    .status-dot.error   { background: #ef4444; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── メッセージエリア ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages-area::-webkit-scrollbar { width: 6px; }
    .messages-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── ウェルカムメッセージ ── */
    .welcome {
      text-align: center;
      padding: 28px 16px;
      color: #94a3b8;
    }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 17px; color: #475569; margin-bottom: 6px; }
    .welcome p  { font-size: 13px; line-height: 1.6; }

    /* ── バブル ── */
    .message-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .avatar.bot  { background: linear-gradient(135deg,#4f46e5,#7c3aed); color:#fff; }
    .avatar.user { background: #e2e8f0; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message-row.bot  .bubble {
      background: #f1f5f9;
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }
    .message-row.user .bubble {
      background: linear-gradient(135deg,#4f46e5,#7c3aed);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Markdown 風スタイル */
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }
    .bubble ul, .bubble ol { margin: 6px 0 6px 18px; }
    .bubble li { margin: 3px 0; }
    .bubble code {
      background: rgba(0,0,0,0.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: "Courier New", monospace;
    }
    .message-row.user .bubble code { background: rgba(255,255,255,0.25); }
    .bubble pre {
      background: rgba(0,0,0,0.06);
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 12px;
    }

    .timestamp {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 4px;
      text-align: right;
    }
    .message-row.bot .timestamp { text-align: left; }

    /* タイピングインジケーター */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: #f1f5f9;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── エラーバナー ── */
    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      display: none;
    }
    .error-banner.visible { display: block; }

    /* ── 入力エリア ── */
    .input-area {
      border-top: 1px solid #e2e8f0;
      padding: 14px 16px;
      background: #fff;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      min-height: 44px;
      max-height: 160px;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
      overflow-y: auto;
    }
    .input-box:focus { border-color: #6366f1; }
    .input-box::placeholder { color: #94a3b8; }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg,#4f46e5,#7c3aed);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    .send-btn:hover  { opacity: 0.9; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    .hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
      text-align: center;
    }

    /* ── レスポンシブ ── */
    @media (max-width: 600px) {
      .chat-container { border-radius: 0; max-height: 100dvh; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

<div class="chat-container">

  <!-- ヘッダー -->
  <div class="chat-header">
    <div class="header-icon">📖</div>
    <div class="header-text">
      <h1>マニュアルアシスタント</h1>
      <p>マニュアルに基づいてご質問にお答えします</p>
    </div>
    <div class="header-actions">
      <span class="user-info" id="userInfo"></span>
      <button class="btn-icon" onclick="refreshManual()" title="マニュアルを更新">🔄 更新</button>
      <button class="btn-icon" onclick="clearChat()"    title="会話をリセット">🗑 リセット</button>
      <button class="btn-icon" onclick="location.href='/logout'" title="ログアウト">🚪 ログアウト</button>
    </div>
  </div>

  <!-- ステータスバー -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">準備完了</span>
  </div>

  <!-- メッセージエリア -->
  <div class="messages-area" id="messagesArea">

    <!-- ウェルカム -->
    <div class="welcome" id="welcomeMsg">
      <div class="icon">💬</div>
      <h2>何でもご質問ください</h2>
      <p>マニュアルの内容に基づいてお答えします。<br>⌘+Enter（Mac）/ Ctrl+Enter（Win）で送信できます。</p>
    </div>

    <!-- エラー表示 -->
    <div class="error-banner" id="errorBanner"></div>

  </div>

  <!-- 入力エリア -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        class="input-box"
        id="inputBox"
        placeholder="質問を入力してください…"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="送信">
        ➤
      </button>
    </div>
    <p class="hint">⌘+Enter（Mac）/ Ctrl+Enter（Win）で送信 ／ Enter で改行</p>
  </div>

</div>

<script>
  // ── 設定（Cloud Run から配信されるため API_BASE は同一オリジン）───
  const API_BASE = "";

  // ── 状態 ───────────────────────────────────────
  let conversationHistory = [];
  let isLoading = false;

  // ── DOM ────────────────────────────────────────
  const messagesArea = document.getElementById("messagesArea");
  const inputBox     = document.getElementById("inputBox");
  const sendBtn      = document.getElementById("sendBtn");
  const statusDot    = document.getElementById("statusDot");
  const statusText   = document.getElementById("statusText");
  const errorBanner  = document.getElementById("errorBanner");
  const welcomeMsg   = document.getElementById("welcomeMsg");

  // ── 起動時：ユーザー情報取得 + サーバー状態確認 ──
  window.addEventListener("load", initialize);

  async function initialize() {
    // ログイン確認
    try {
      const res  = await fetch("/me");
      const data = await res.json();
      if (!data.logged_in) { location.href = "/"; return; }
      document.getElementById("userInfo").textContent = "👤 " + (data.name || data.email);
    } catch { /* ignore */ }

    // サーバー状態確認
    try {
      const res  = await fetch("/status");
      const data = await res.json();
      setStatus("ready", `モデル: ${data.model}　マニュアル: ${data.manual_chars.toLocaleString()} 文字`);
    } catch {
      setStatus("error", "サーバーに接続できません。");
    }
  }

  // ── 送信処理 ───────────────────────────────────
  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text || isLoading) return;

    hideError();
    hideWelcome();
    addMessage("user", text);
    inputBox.value = "";
    adjustTextarea();
    inputBox.focus();

    const typingRow = addTypingIndicator();
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history: conversationHistory }),
      });

      const data = await res.json();
      typingRow.remove();

      if (!res.ok || data.error) {
        showError(data.error || `サーバーエラー (${res.status})`);
      } else {
        conversationHistory = data.history;
        addMessage("bot", data.response);
      }

    } catch (e) {
      typingRow.remove();
      showError("通信エラーが発生しました。サーバーの接続を確認してください。");
    } finally {
      setLoading(false);
    }
  }

  // ── マニュアル更新 ─────────────────────────────
  async function refreshManual() {
    setStatus("loading", "マニュアルを更新中…");
    try {
      const res  = await fetch(`${API_BASE}/refresh-manual`, { method: "POST" });
      const data = await res.json();
      setStatus("ready", data.message);
    } catch {
      setStatus("error", "マニュアルの更新に失敗しました");
    }
  }

  // ── チャットリセット ────────────────────────────
  function clearChat() {
    conversationHistory = [];
    const rows = messagesArea.querySelectorAll(".message-row, .error-banner");
    rows.forEach(el => el.remove());
    welcomeMsg.style.display = "";
    hideError();
  }

  // ── UI ヘルパー ────────────────────────────────
  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = `message-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "bot" ? "🤖" : "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = formatText(text);

    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });

    const col = document.createElement("div");
    col.style.maxWidth = "72%";
    col.appendChild(bubble);
    col.appendChild(ts);

    if (role === "bot") {
      row.appendChild(avatar);
      row.appendChild(col);
    } else {
      row.appendChild(col);
      row.appendChild(avatar);
    }

    messagesArea.appendChild(row);
    scrollBottom();
    return row;
  }

  function addTypingIndicator() {
    const row = document.createElement("div");
    row.className = "message-row bot";

    const avatar = document.createElement("div");
    avatar.className = "avatar bot";
    avatar.textContent = "🤖";

    const indicator = document.createElement("div");
    indicator.className = "typing-indicator";
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement("div");
      dot.className = "typing-dot";
      indicator.appendChild(dot);
    }

    row.appendChild(avatar);
    row.appendChild(indicator);
    messagesArea.appendChild(row);
    scrollBottom();
    return row;
  }

  function formatText(text) {
    // 簡易 Markdown → HTML 変換
    return text
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      .replace(/^### (.+)$/gm, "<strong>$1</strong>")
      .replace(/^## (.+)$/gm,  "<strong>$1</strong>")
      .replace(/^# (.+)$/gm,   "<strong>$1</strong>")
      .replace(/^- (.+)$/gm,   "• $1")
      .replace(/\n/g, "<br>");
  }

  function setLoading(flag) {
    isLoading = flag;
    sendBtn.disabled = flag;
    setStatus(flag ? "loading" : "ready", flag ? "回答を生成中…" : "準備完了");
  }

  function setStatus(type, message) {
    statusDot.className = "status-dot" + (type === "loading" ? " loading" : type === "error" ? " error" : "");
    statusText.textContent = message;
  }

  function showError(msg) {
    errorBanner.textContent = "⚠️ " + msg;
    errorBanner.classList.add("visible");
    scrollBottom();
  }

  function hideError()   { errorBanner.classList.remove("visible"); }
  function hideWelcome() { welcomeMsg.style.display = "none"; }
  function scrollBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }

  // ── テキストエリア自動リサイズ ─────────────────
  inputBox.addEventListener("input", adjustTextarea);
  function adjustTextarea() {
    inputBox.style.height = "auto";
    inputBox.style.height = Math.min(inputBox.scrollHeight, 160) + "px";
  }

  // ── キーバインド ───────────────────────────────
  inputBox.addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
